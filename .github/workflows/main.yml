name: Deploy to All Environments

on:
  push:
  workflow_dispatch:

env:
  CI: true
  TZ: Europe/Oslo

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-string.outputs.version }}
      image: ${{ steps.version-string.outputs.image }}

    steps:
      - name: Generate version string
        id: version-string
        shell: bash
        run: |
          version="$(date -u '+%Y.%m.%d-%H.%M')-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/kartverket/matrikkel-proxy:${version}" >> "$GITHUB_OUTPUT"

  package-image:
    name: Build and (conditionally) Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - version
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        env:
          image: ${{ needs.version.outputs.image }}
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.image }}

  pharos:
    name: Run Pharos
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - version
      - package-image
    permissions:
      actions: read
      packages: read
      contents: read
      security-events: write
    steps:
      - name: "Run Pharos"
        uses: kartverket/pharos@v0.5.0
        with:
          image_url: ${{ needs.version.outputs.image }}
          trivy: true
          tfsec: true
          disable_severity_check: true

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - version
      - package-image
    permissions:
      id-token: write

    steps:
      - name: Deploy matrikkel-proxy to dev
        uses: kartverket/matrikkel-actions/apps-repo-deploy@TH-2313-action
        env:
          version: ${{ needs.version.outputs.version }}
        with:
          apps: |
            atkv3-dev:matrikkel-main:matrikkel-proxy:${{ env.version }}

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - version
      - package-image
      - deploy-dev
    permissions:
      id-token: write

    steps:
      - name: Deploy matrikkel-proxy to QA environments
        uses: kartverket/matrikkel-actions/apps-repo-deploy@TH-2313-action
        env:
          version: ${{ needs.version.outputs.version }}
        with:
          apps: |
            atkv3-prod:matrikkel-betatest:matrikkel-proxy:${{ env.version }}
            atkv3-prod:matrikkel-prodtest:matrikkel-proxy:${{ env.version }}

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - version
      - package-image
      - pharos
      - deploy-qa
    environment:
      name: production
    permissions:
      id-token: write

    steps:
      - name: Deploy matrikkel-proxy to production
        uses: kartverket/matrikkel-actions/apps-repo-deploy@TH-2313-action
        env:
          version: ${{ needs.version.outputs.version }}
        with:
          apps: |
            atkv3-prod:matrikkel-main:matrikkel-proxy:${{ env.version }}
            atkv3-prod:matrikkel-nd:matrikkel-proxy:${{ env.version }}
            atkv3-prod:matrikkel-se-eiendom:matrikkel-proxy:${{ env.version }}
